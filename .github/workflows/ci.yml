name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package + dev deps
        run: pip install -e ".[dev,server]"

      - name: Ruff (lint + format check)
        run: ruff check . && ruff format --check .

      - name: Mypy (type check)
        run: mypy src/

      - name: Pytest (unit, skip torch-heavy tests)
        run: python -m pytest tests/unit/ -v --tb=short --ignore=tests/unit/test_kokoro_engine.py --ignore=tests/unit/test_synthesizer.py --ignore=tests/unit/test_voice_manager.py

  test-kokoro:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install package + kokoro + dev deps
        run: pip install -e ".[kokoro,dev]"

      - name: Pytest (full suite)
        run: python -m pytest tests/ -v --tb=short
